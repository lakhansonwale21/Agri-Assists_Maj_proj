<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Agri-Assists</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100"
    style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1423483641154-7160cb0cb3b6?q=80&amp;w=2000&amp;auto=format&amp;fit=crop') center/cover fixed;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold fs-4" href="/">
                <i class="fas fa-leaf text-accent me-2"></i> <span data-i18n="agriassists_eab25">Agri-Assists</span>
            </a>
            <div class="ms-auto">
                <a href="/login" class="btn btn-outline-light rounded-pill px-4 fw-bold shadow-sm bg-glass"><span
                        data-i18n="login_instead_c554e">Login instead</span></a>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 py-5 position-relative z-index-1">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">
                <div class="card shadow-lg border-0 rounded-4 overflow-hidden animate-fade-in-up hover-lift">
                    <div class="card-header bg-white p-4 pb-0 border-0 text-center">
                        <h3 class="fw-bolder fs-2 mb-4"><span data-i18n="create_your_account_f832d">Create Your
                                Account</span></h3>
                        <ul class="nav nav-pills nav-fill custom-pills mb-2 gap-2" id="registerTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active rounded-pill px-4 py-3 fw-bold shadow-sm" id="farmer-tab"
                                    data-bs-toggle="tab" data-bs-target="#farmer" type="button" role="tab"><i
                                        class="fas fa-seedling me-2"></i> <span
                                        data-i18n="farmer_8bf7a">Farmer</span></button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link rounded-pill px-4 py-3 fw-bold shadow-sm" id="shop-tab"
                                    data-bs-toggle="tab" data-bs-target="#shop" type="button" role="tab"><i
                                        class="fas fa-store me-2"></i> <span
                                        data-i18n="shopkeeper_c5e04">Shopkeeper</span></button>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body p-4 p-md-5 pt-3">
                        <div class="tab-content" id="registerTabsContent">

                            <!-- Farmer Form -->
                            <div class="tab-pane fade show active" id="farmer" role="tabpanel">
                                <form id="farmerRegisterForm">
                                    <div class="row g-4">
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="full_name_63005">Full Name</span></label>
                                            <input type="text"
                                                class="form-control py-3 bg-light shadow-none border-light" name="name"
                                                placeholder="Enter Name" required=""
                                                data-i18n-placeholder="john_doe_4c2a9">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="email_address_643a8">Email Address</span></label>
                                            <input type="email"
                                                class="form-control py-3 bg-light shadow-none border-light" name="email"
                                                placeholder="Enter E-m@il" required=""
                                                data-i18n-placeholder="johnexamplecom_d4c74">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="password_dc647">Password</span></label>
                                            <input type="password"
                                                class="form-control py-3 bg-light shadow-none border-light"
                                                name="password" placeholder="Create a password" required=""
                                                data-i18n-placeholder="create_a_password_72786">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="phone_number_1e4db">Phone Number</span></label>
                                            <input type="tel"
                                                class="form-control py-3 bg-light shadow-none border-light" name="phone"
                                                placeholder="+91 9876543210" required="">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="city__village_be734">City / Village</span></label>
                                            <input type="text"
                                                class="form-control py-3 bg-light shadow-none border-light" name="city"
                                                placeholder="e.g. Pune" required=""
                                                data-i18n-placeholder="eg_pune_25633">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="state_46a2a">State</span></label>
                                            <input type="text"
                                                class="form-control py-3 bg-light shadow-none border-light" name="state"
                                                placeholder="e.g. Maharashtra" required=""
                                                data-i18n-placeholder="eg_maharashtra_809f5">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="farm_size_31e95">Farm Size</span></label>
                                            <input type="text"
                                                class="form-control py-3 bg-light shadow-none border-light"
                                                name="farmSize" placeholder="e.g. 5 acres" required=""
                                                data-i18n-placeholder="eg_5_acres_499b2">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="main_crop_88de6">Main Crop</span></label>
                                            <input type="text"
                                                class="form-control py-3 bg-light shadow-none border-light"
                                                name="mainCrop" placeholder="e.g. Wheat" required=""
                                                data-i18n-placeholder="eg_wheat_88746">
                                        </div>
                                        <div class="col-12 mt-4 pt-2">
                                            <button type="submit"
                                                class="btn btn-accent rounded-pill w-100 py-3 fw-bold fs-5 shadow-sm"><span
                                                    data-i18n="register_as_farmer_dfd4b">Register as Farmer</span> <i
                                                    class="fas fa-arrow-right ms-2"></i></button>
                                        </div>
                                    </div>
                                </form>
                            </div>

                            <!-- Shopkeeper Form -->
                            <div class="tab-pane fade" id="shop" role="tabpanel">
                                <form id="shopRegisterForm">
                                    <div class="row g-4">
                                        <div class="col-md-12">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="shop_name_9127f">Shop Name</span></label>
                                            <input type="text"
                                                class="form-control py-3 bg-light shadow-none border-light"
                                                name="shopName" placeholder="Agri Supplies Co." required=""
                                                data-i18n-placeholder="agri_supplies_co_26e5c">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="owner_name_b7dbf">Owner Name</span></label>
                                            <input type="text"
                                                class="form-control py-3 bg-light shadow-none border-light" name="name"
                                                placeholder="Enter Name" required=""
                                                data-i18n-placeholder="john_doe_4c2a9">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="email_address_643a8">Email Address</span></label>
                                            <input type="email"
                                                class="form-control py-3 bg-light shadow-none border-light" name="email"
                                                placeholder="shop@example.com" required=""
                                                data-i18n-placeholder="shopexamplecom_b4ad2">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="password_dc647">Password</span></label>
                                            <input type="password"
                                                class="form-control py-3 bg-light shadow-none border-light"
                                                name="password" placeholder="Create a password" required=""
                                                data-i18n-placeholder="create_a_password_72786">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="phone_number_1e4db">Phone Number</span></label>
                                            <input type="tel"
                                                class="form-control py-3 bg-light shadow-none border-light" name="phone"
                                                placeholder="+91 9876543210" required="">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="city_57d05">City</span></label>
                                            <input type="text"
                                                class="form-control py-3 bg-light shadow-none border-light" name="city"
                                                placeholder="e.g. Pune" required=""
                                                data-i18n-placeholder="eg_pune_25633">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-dark fw-semibold mb-2"><span
                                                    data-i18n="full_shop_address_f1fe2">Full Shop Address</span></label>
                                            <input type="text"
                                                class="form-control py-3 bg-light shadow-none border-light"
                                                name="shopAddress" placeholder="Street, Building, etc." required=""
                                                data-i18n-placeholder="street_building_etc_2bf76">
                                        </div>
                                        <div class="col-12 mt-4 pt-2">
                                            <button type="submit"
                                                class="btn btn-accent rounded-pill w-100 py-3 fw-bold fs-5 shadow-sm"><span
                                                    data-i18n="register_as_shopkeep_4bc6b">Register as Shopkeeper</span>
                                                <i class="fas fa-arrow-right ms-2"></i></button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>



    <div class="lang-selector-floating"
        style="position:fixed; bottom:20px; right:20px; z-index:9999; background:rgba(255,255,255,0.9); padding:5px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        <select id="langSelect" class="form-select form-select-sm border-0 shadow-none fw-bold text-success">
            <option value="en"><span data-i18n="english_en_935bb">English (EN)</span></option>
            <option value="hi"><span data-i18n="_hi_270b2">हिंदी (HI)</span></option>
            <option value="mr"><span data-i18n="_mr_b445f">मराठी (MR)</span></option>
        </select>
    </div>
</body>

</html>
