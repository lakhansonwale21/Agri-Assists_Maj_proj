<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Shops - Agri-Assists</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100" style="background: linear-gradient(rgba(244, 252, 245, 0.9), rgba(244, 252, 245, 0.95)), url('https://images.unsplash.com/photo-1488459716781-31db52582fe9?q=80&amp;w=2000&amp;auto=format&amp;fit=crop') center/cover fixed;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary-green sticky-top shadow-sm py-2 bg-opacity-75" style="backdrop-filter: blur(10px);">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold fs-5 text-white" href="/dashboard"><i class="fas fa-arrow-left me-2"></i> <span data-i18n="back_to_dashboard_3649f">Back to Dashboard</span></a>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <div class="row mx-0 border border-light bg-white p-4 rounded-4 shadow-sm mb-5 align-items-center">
            <div class="col-lg-7 mb-3 mb-lg-0">
                <h2 class="fw-bolder fs-2 mb-1"><i class="fas fa-store text-primary-green me-2"></i> <span data-i18n="explore_local_agrosh_b3d61">Explore Local Agro-Shops</span></h2>
                <p class="text-muted mb-0 fs-5"><span data-i18n="find_highquality_see_917dc">Find high-quality seeds, fertilizers, and equipment near you.</span></p>
            </div>
            <div class="col-lg-5">
                <div class="input-group input-group-lg shadow-sm rounded-pill overflow-hidden border border-light">
                    <span class="input-group-text bg-white border-0 pe-1"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" id="shopSearch" class="form-control border-0 shadow-none fs-6" placeholder="Search product or category..." data-i18n-placeholder="search_product_or_sh_3a1c8">
                    <span class="input-group-text bg-white border-0 border-start px-2"><i class="fas fa-filter text-muted"></i></span>
                    <select id="shopFilter" class="form-select border-0 shadow-none fs-6 bg-light" style="max-width: 200px;">
                        <option value=""><span data-i18n="all_shops_6526c">All Shops</span></option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row g-4" id="productsGrid">
            <!-- Products injected by JS -->
            <div class="col-12 text-center py-5"><div class="spinner-border text-success mx-auto" style="width: 3rem; height: 3rem;"></div></div>
        </div>
    </div>

    <!-- Request Modal -->
    <div class="modal fade" id="requestModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header bg-primary-green text-white border-0 py-3">
                    <h5 class="modal-title fw-bold"><i class="fas fa-paper-plane me-2 text-accent"></i> <span data-i18n="send_request_to_shop_91ed4">Send Request to Shop</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 p-md-5 bg-white">
                    <form id="productRequestForm">
                        <input type="hidden" id="reqShopId">
                        <input type="hidden" id="reqProductId">
                        
                        <div class="p-3 bg-light-soft rounded-3 border border-light mb-4">
                            <div class="mb-3">
                                <small class="text-muted text-uppercase fw-bold d-block mb-1 fs-7"><span data-i18n="requested_product_d263b">Requested Product</span></small>
                                <div class="fs-4 fw-bold text-dark" id="reqProductNameDisplay"></div>
                            </div>
                            <div class="d-flex justify-content-between border-top pt-3">
                                <div>
                                    <small class="text-muted text-uppercase fw-bold d-block mb-1 fs-7"><span data-i18n="unit_price_19710">Unit Price</span></small>
                                    <div class="fs-5 fw-bolder text-accent" id="reqProductPriceDisplay"></div>
                                </div>
                                <div class="text-end">
                                    <small class="text-muted text-uppercase fw-bold d-block mb-1 fs-7"><span data-i18n="available_stock_e525c">Available Stock</span></small>
                                    <div class="fs-5 fw-semibold text-dark" id="reqProductStockDisplay"></div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="quantity_required_0aa62">Quantity Required</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 py-3"><i class="fas fa-sort-numeric-up text-primary-green"></i></span>
                                <input type="number" class="form-control py-3 bg-light shadow-none border-start-0" id="reqQuantity" min="1" required="" placeholder="Enter amount" data-i18n-placeholder="enter_amount_b532a">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="message_to_shopkeepe_c4f28">Message to Shopkeeper</span> <span class="text-muted fw-normal"><span data-i18n="optional_d9e6f">(Optional)</span></span></label>
                            <textarea class="form-control bg-light shadow-none border-light p-3" id="reqMessage" rows="3" placeholder="I need this urgently for my farm..." data-i18n-placeholder="i_need_this_urgently_e2e32"></textarea>
                        </div>
                        <button type="submit" class="btn btn-accent rounded-pill w-100 py-3 fw-bold fs-5 shadow-sm mt-2"><span data-i18n="submit_request_d2d03">Submit Request</span> <i class="fas fa-check-circle ms-2"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (getUserRole() !== 'farmer') {
                window.location.href = '/dashboard';
                return;
            }

            try {
                const res = await apiCall('/products', 'GET');
                const grid = document.getElementById('productsGrid');

                if (res.success && res.products.length > 0) {
                    const renderGrid = (items) => {
                        let html = '';
                        items.forEach(p => {
                            const shop = p.shopId || {};
                            let catIcon = 'fa-box';
                            if(p.category.toLowerCase().includes('seed')) catIcon = 'fa-seedling';
                            if(p.category.toLowerCase().includes('fertilizer')) catIcon = 'fa-flask';
                            if(p.category.toLowerCase().includes('equipment')) catIcon = 'fa-tractor';

                            html += `
                                <div class="col-md-6 col-lg-4 col-xl-3">
                                    <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden product-card d-flex flex-column animate-fade-in-up hover-lift">
                                        <div class="card-body p-4 d-flex flex-column">
                                            <div class="d-flex justify-content-between align-items-start mb-3">
                                                <span class="badge rounded-pill ${p.quantity > 0 ? 'bg-success' : 'bg-danger'} bg-opacity-10 ${p.quantity > 0 ? 'text-success' : 'text-danger'} px-2 py-1"><i class="fas ${catIcon} me-1"></i> ${p.category}</span>
                                                 <span class="badge rounded-pill ${p.quantity > 0 ? 'bg-success' : 'bg-danger'} bg-opacity-10 ${p.quantity > 0 ? 'text-success' : 'text-danger'} px-2 py-1">${p.quantity > 0 ? 'In Stock' : 'Out of Stock'}</span>
                                            </div>
                                            <h4 class="fw-bolder text-dark mb-1 text-truncate" title="${p.productName}">${p.productName}</h4>
                                            <h3 class="text-accent fw-bolder mb-3">₹${p.price}</h3>
                                            
                                            <p class="text-muted small mb-4 flex-grow-1" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${p.description || 'No description available for this product.'}</p>
                                            
                                            <div class="small bg-light-soft rounded-3 p-3 mb-0 mt-auto border border-light">
                                                <div class="mb-2 text-dark fw-semibold text-truncate"><i class="fas fa-store me-2 text-primary-green"></i> ${shop.shopName || 'Unknown Shop'}</div>
                                                <div class="mb-2 text-muted text-truncate"><i class="fas fa-map-marker-alt me-2 text-danger opacity-75"></i> ${shop.city || 'Unknown City'}</div>
                                                <div class="text-muted"><i class="fas fa-boxes me-2 text-info opacity-75"></i> Total Available: ${p.quantity} Unit(s)</div>
                                            </div>
                                        </div>
                                        <div class="card-footer bg-white border-0 p-4 pt-0">
                                            <button class="btn btn-outline-primary-custom rounded-pill w-100 fw-bold req-btn py-2 shadow-sm" 
                                                data-pid="${p._id}" data-pname="${p.productName}" 
                                                data-sid="${shop._id || p.shopId}" data-psprice="${p.price}" data-pqty="${p.quantity}" ${p.quantity <= 0 ? 'disabled' : ''}>
                                                ${p.quantity > 0 ? 'Request Quotation' : 'Unavailable'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        if (items.length === 0) html = '<div class="col-12 text-center text-muted py-5"><i class="fas fa-search fs-1 mb-3 d-block opacity-25"></i><h4>No products found matching your search.</h4></div>';
                        grid.innerHTML = html;

                        // Attach modal listeners
                        document.querySelectorAll('.req-btn').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                const b = e.target.closest('.req-btn');
                                document.getElementById('reqProductId').value = b.getAttribute('data-pid');
                                document.getElementById('reqShopId').value = b.getAttribute('data-sid');
                                
                                document.getElementById('reqProductNameDisplay').textContent = b.getAttribute('data-pname');
                                document.getElementById('reqProductPriceDisplay').textContent = `₹${b.getAttribute('data-psprice')}`;
                                document.getElementById('reqProductStockDisplay').textContent = `${b.getAttribute('data-pqty')} Units`;
                                
                                const modal = new bootstrap.Modal(document.getElementById('requestModal'));
                                modal.show();
                            });
                        });
                        // Populate Shop Filter Dropdown
                        const shopFilter = document.getElementById('shopFilter');
                        const uniqueShops = [];
                        res.products.forEach(p => {
                            if (p.shopId && !uniqueShops.some(s => s._id === p.shopId._id)) {
                                uniqueShops.push(p.shopId);
                            }
                        });
                        uniqueShops.sort((a,b) => (a.shopName || '').localeCompare(b.shopName || ''));
                        uniqueShops.forEach(shop => {
                            const option = document.createElement('option');
                            option.value = shop._id;
                            option.textContent = shop.shopName || 'Unknown Shop';
                            shopFilter.appendChild(option);
                        });

                        const applyFilters = () => {
                            const term = document.getElementById('shopSearch').value.toLowerCase();
                            const selectedShopId = shopFilter.value;

                            const filtered = res.products.filter(p => {
                                const matchesSearch = p.productName.toLowerCase().includes(term) || 
                                                      p.category.toLowerCase().includes(term);
                                const matchesShop = selectedShopId ? (p.shopId && p.shopId._id === selectedShopId) : true;
                                return matchesSearch && matchesShop;
                            });
                            renderGrid(filtered);
                        };

                        document.getElementById('shopSearch').addEventListener('input', applyFilters);
                        shopFilter.addEventListener('change', applyFilters);
                    };

                    renderGrid(res.products);
                } else {
                    grid.innerHTML = '<div class="col-12 text-center text-muted py-5"><i class="fas fa-box-open fs-1 mb-3 d-block opacity-25"></i><h4>No products available right now.</h4><p>Shopkeepers haven\'t listed any products yet.</p></div>';
                }
            } catch(e) {
                 document.getElementById('productsGrid').innerHTML = '<div class="col-12 text-center text-danger py-5"><i class="fas fa-exclamation-triangle fs-1 mb-3 d-block opacity-25"></i> Error loading products.</div>';
            }

            // Handle Request Submission
            document.getElementById('productRequestForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const shopId = document.getElementById('reqShopId').value;
                const productId = document.getElementById('reqProductId').value;
                const quantity = document.getElementById('reqQuantity').value;
                const message = document.getElementById('reqMessage').value;

                try {
                    const response = await apiCall('/requests', 'POST', { shopId, productId, quantity, message });
                    if (response.success) {
                        showAlert('Request sent successfully to the shopkeeper!', 'success');
                        bootstrap.Modal.getInstance(document.getElementById('requestModal')).hide();
                        document.getElementById('productRequestForm').reset();
                    } else {
                        showAlert(response.message || 'Failed to send request.', 'danger');
                    }
                } catch(err) {
                    showAlert('Network error.', 'danger');
                }
            });
        });
    </script>



            <div class="lang-selector-floating" style="position:fixed; bottom:20px; right:20px; z-index:9999; background:rgba(255,255,255,0.9); padding:5px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
                <select id="langSelect" class="form-select form-select-sm border-0 shadow-none fw-bold text-success">
                    <option value="en"><span data-i18n="english_en_935bb">English (EN)</span></option>
                    <option value="hi"><span data-i18n="_hi_270b2">हिंदी (HI)</span></option>
                    <option value="mr"><span data-i18n="_mr_b445f">मराठी (MR)</span></option>
                </select>
            </div>
            </body></html>
