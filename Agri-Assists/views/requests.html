<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Requests - Agri-Assists</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100" style="background: linear-gradient(rgba(244, 252, 245, 0.9), rgba(244, 252, 245, 0.95)), url('https://images.unsplash.com/photo-1495107315404-e3801f9bb3ba?q=80&amp;w=2000&amp;auto=format&amp;fit=crop') center/cover fixed;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary-green sticky-top shadow-sm py-2 bg-opacity-75" style="backdrop-filter: blur(10px);">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold fs-5 text-white" href="/dashboard"><i class="fas fa-arrow-left me-2"></i> <span data-i18n="back_to_dashboard_3649f">Back to Dashboard</span></a>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <div class="row mx-0 border border-light bg-white p-4 rounded-4 shadow-sm mb-5 align-items-center">
            <div class="col-md-8 mb-3 mb-md-0">
                <h2 class="fw-bolder fs-2 mb-1"><i class="fas fa-clipboard-list text-primary-green me-2"></i> <span data-i18n="communication__reque_02346">Communication &amp; Requests</span></h2>
                <p class="text-muted mb-0 fs-5"><span data-i18n="view_and_manage_all__2ede6">View and manage all your product inquiries securely.</span></p>
            </div>
            <div class="col-md-4 text-md-end farmer-only" style="display:none;">
                <button type="button" class="btn btn-accent rounded-pill px-4 py-2 fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#newRequestModal" id="btnOpenNewRequest">
                    <i class="fas fa-plus-circle me-2"></i> <span data-i18n="create_new_request_dec5c">Create New Request</span>
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-5 animate-fade-in-up hover-lift">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle fs-5">
                        <thead class="bg-light text-muted">
                            <tr>
                                <th class="ps-4 py-4 fw-semibold border-bottom-0"><span data-i18n="date_44749">Date</span></th>
                                <th class="py-4 fw-semibold border-bottom-0"><span data-i18n="product_details_b8900">Product Details</span></th>
                                <th id="targetPartyHeader" class="py-4 fw-semibold border-bottom-0"><span data-i18n="requested_tofrom_3f42c">Requested To/From</span></th>
                                <th class="py-4 fw-semibold border-bottom-0"><span data-i18n="message_4c2a8">Message</span></th>
                                <th class="py-4 fw-semibold border-bottom-0"><span data-i18n="status_ec53a">Status</span></th>
                                <th id="actionsHeader" class="pe-4 py-4 fw-semibold border-bottom-0 text-end" style="display:none;"><span data-i18n="actions_06df3">Actions</span></th>
                            </tr>
                        </thead>
                        <tbody id="requestsTableBody" class="border-top-0">
                            <tr><td colspan="6" class="text-center py-5 text-muted"><div class="spinner-border text-success"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- View Message Modal -->
    <div class="modal fade" id="msgModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header bg-primary-green text-white border-0 py-3">
                    <h5 class="modal-title fw-bold"><i class="fas fa-comment-dots me-2"></i> <span data-i18n="request_message_a167c">Request Message</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 p-md-5 bg-white">
                    <div class="p-4 bg-light-soft rounded-3 border border-light text-dark fs-5 fst-italic shadow-sm position-relative">
                        <i class="fas fa-quote-left display-4 text-primary-green opacity-25 position-absolute top-0 start-0 ms-2 mt-2"></i>
                        <p class="mb-0 position-relative z-index-1 lh-lg" id="msgContent" style="text-indent: 1.5rem;"></p>
                        <i class="fas fa-quote-right display-4 text-primary-green opacity-25 position-absolute bottom-0 end-0 me-2 mb-2"></i>
                    </div>
                    <div id="shopReplySection" style="display:none;" class="mt-4 border-top pt-4">
                        <h6 class="fw-bold text-primary-green mb-3"><i class="fas fa-reply me-2"></i><span data-i18n="shopkeepers_reply_ab24a">Shopkeeper's Reply:</span></h6>
                        <div class="p-4 bg-light rounded-3 border border-light text-dark fs-5 shadow-sm position-relative">
                            <p class="mb-0 position-relative z-index-1 lh-lg" id="shopReplyContent"></p>
                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <button type="button" class="btn btn-outline-primary-custom rounded-pill px-4" data-bs-dismiss="modal"><span data-i18n="close_d3d2e">Close</span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Response Modal (Shopkeeper) -->
    <div class="modal fade" id="responseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header bg-primary-green text-white border-0 py-3">
                    <h5 class="modal-title fw-bold" id="responseModalTitle"><i class="fas fa-reply me-2"></i> <span data-i18n="send_response_3fd01">Send Response</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 p-md-5 bg-white">
                    <div class="mb-4">
                        <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="message_to_farmer_62f7a">Message to Farmer</span> <span class="text-muted fw-normal"><span data-i18n="optional_d9e6f">(Optional)</span></span></label>
                        <textarea class="form-control bg-light shadow-none border-light p-3" id="responseMessageTxt" rows="3" placeholder="We have this in stock and can deliver tomorrow..." data-i18n-placeholder="we_have_this_in_stoc_66dd8"></textarea>
                    </div>
                    <input type="hidden" id="responseTargetId">
                    <input type="hidden" id="responseStatus">
                    <button type="button" id="confirmResponseBtn" class="btn btn-primary-custom rounded-pill w-100 py-3 fw-bold fs-5 shadow-sm"><span data-i18n="confirm_70d9b">Confirm</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- New Request Modal (Farmer) -->
    <div class="modal fade" id="newRequestModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header bg-primary-green text-white border-0 py-3">
                    <h5 class="modal-title fw-bold"><i class="fas fa-paper-plane me-2 text-accent"></i> <span data-i18n="create_new_request_dec5c">Create New Request</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 p-md-5 bg-white">
                    <form id="newRequestForm">
                        <div class="mb-3">
                            <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="select_shopkeeper_ef936">Select Shopkeeper</span></label>
                            <select class="form-select bg-light shadow-none border-light p-3" id="newReqShop" required="">
                                <option value=""><span data-i18n="_choose_a_shop__ed1cb">-- Choose a Shop --</span></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="select_product_d401f">Select Product</span></label>
                            <select class="form-select bg-light shadow-none border-light p-3" id="newReqProduct" required="" disabled="">
                                <option value=""><span data-i18n="_choose_a_product__d1f08">-- Choose a Product --</span></option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="quantity_required_0aa62">Quantity Required</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 py-3"><i class="fas fa-sort-numeric-up text-primary-green"></i></span>
                                <input type="number" class="form-control py-3 bg-light shadow-none border-start-0" id="newReqQuantity" min="1" required="" placeholder="Enter amount" data-i18n-placeholder="enter_amount_b532a">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="message_to_shopkeepe_c4f28">Message to Shopkeeper</span> <span class="text-muted fw-normal"><span data-i18n="optional_d9e6f">(Optional)</span></span></label>
                            <textarea class="form-control bg-light shadow-none border-light p-3" id="newReqMessage" rows="3" placeholder="I need this urgently for my farm..." data-i18n-placeholder="i_need_this_urgently_e2e32"></textarea>
                        </div>
                        <button type="submit" id="submitNewRequestBtn" class="btn btn-accent rounded-pill w-100 py-3 fw-bold fs-5 shadow-sm mt-2"><span data-i18n="send_request_2da24">Send Request</span> <i class="fas fa-check-circle ms-2"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const role = getUserRole();
            if (!role) {
                window.location.href = '/login';
                return;
            }

            document.getElementById('targetPartyHeader').textContent = role === 'farmer' ? 'Target Shop' : 'Requesting Farmer';
            if (role === 'shopkeeper') {
                document.getElementById('actionsHeader').style.display = 'table-cell';
            }

            const loadRequests = async () => {
                try {
                    const res = await apiCall('/requests', 'GET');
                    const tbody = document.getElementById('requestsTableBody');
                    
                    if(res.success) {
                        let html = '';
                        // Sort descending by date
                        res.requests.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(req => {
                            const date = new Date(req.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + '<br><small class="text-muted">' + new Date(req.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + '</small>';
                            const product = req.productId ? `<i class="fas fa-box text-primary-green me-1"></i> ${req.productId.productName} Qty: ${req.quantity}` : '<i class="fas fa-ban me-1"></i> Deleted Product';
                            const targetName = role === 'farmer' ? (req.shopId ? req.shopId.shopName : 'Unknown') : (req.farmerId ? `${req.farmerId.name}<br><small class="text-muted"><i class="fas fa-phone-alt fs-7"></i> ${req.farmerId.phone}</small>` : 'Unknown');
                            
                            const statusBadge = req.status === 'pending' ? 'bg-warning text-dark' : (req.status === 'accepted' ? 'bg-success' : 'bg-danger');
                            
                            const hasMessage = req.message || req.responseMessage;
                            const msgParam = req.message ? encodeURIComponent(req.message) : '';
                            const replyParam = req.responseMessage ? encodeURIComponent(req.responseMessage) : '';
                            const msgBtn = hasMessage ? `<button class="btn btn-sm btn-outline-primary-custom rounded-pill px-3 fw-bold view-msg-btn shadow-sm" data-msg="${msgParam}" data-reply="${replyParam}"><i class="fas fa-envelope-open-text me-1"></i> Read Messages</button>` : '<i class="fas fa-comment-slash me-1 opacity-50"></i> None';
                            
                            let actionsHtml = '';
                            if (role === 'shopkeeper') {
                                if (req.status === 'pending') {
                                    actionsHtml = `
                                        <td class="pe-4 text-end">
                                            <div class="d-flex justify-content-end gap-2">
                                                <button class="btn btn-sm btn-success rounded-pill px-3 update-btn shadow-sm fw-bold" data-id="${req._id}" data-status="accepted"><i class="fas fa-check me-1"></i> Accept</button>
                                                <button class="btn btn-sm btn-outline-danger rounded-pill px-3 update-btn shadow-sm fw-bold" data-id="${req._id}" data-status="rejected"><i class="fas fa-times me-1"></i> Reject</button>
                                            </div>
                                        </td>
                                    `;
                                } else {
                                    actionsHtml = `<td class="pe-4 text-end text-muted small"><i class="fas fa-check-double text-success me-1"></i> Resolved</td>`;
                                }
                            }

                            html += `
                                <tr>
                                    <td class="ps-4 py-4 align-middle">${date}</td>
                                    <td class="py-4 align-middle">${product}</td>
                                    <td class="py-4 align-middle">${targetName}</td>
                                    <td class="py-4 align-middle">${msgBtn}</td>
                                    <td class="py-4 align-middle">${req.status.toUpperCase()}</td>
                                    ${role === 'shopkeeper' ? actionsHtml : ''}
                                </tr>
                            `;
                        });
                        if (res.requests.length === 0) html = `<tr><td colspan="${role === 'shopkeeper'?6:5}" class="text-center py-5 text-muted"><i class="fas fa-folder-open fs-1 mb-3 d-block opacity-25"></i> No requests found.</td></tr>`;
                        tbody.innerHTML = html;

                        // Message viewing
                        document.querySelectorAll('.view-msg-btn').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                const rawMsg = decodeURIComponent(e.currentTarget.getAttribute('data-msg'));
                                const rawReply = e.currentTarget.getAttribute('data-reply') ? decodeURIComponent(e.currentTarget.getAttribute('data-reply')) : '';
                                
                                document.getElementById('msgContent').textContent = rawMsg || 'No message provided by farmer.';
                                
                                const replySection = document.getElementById('shopReplySection');
                                if (rawReply) {
                                    replySection.style.display = 'block';
                                    document.getElementById('shopReplyContent').textContent = rawReply;
                                } else {
                                    replySection.style.display = 'none';
                                }
                                
                                new bootstrap.Modal(document.getElementById('msgModal')).show();
                            });
                        });

                        // Update Status (Shopkeeper Only)
                        if (role === 'shopkeeper') {
                            document.querySelectorAll('.update-btn').forEach(btn => {
                                btn.addEventListener('click', (e) => {
                                    const id = e.currentTarget.getAttribute('data-id');
                                    const status = e.currentTarget.getAttribute('data-status');
                                    
                                    document.getElementById('responseTargetId').value = id;
                                    document.getElementById('responseStatus').value = status;
                                    document.getElementById('responseMessageTxt').value = '';
                                    
                                    document.getElementById('responseModalTitle').innerHTML = status === 'accepted' ? '<i class="fas fa-check-circle me-2"></i> Accept Request' : '<i class="fas fa-times-circle me-2"></i> Reject Request';
                                    
                                    new bootstrap.Modal(document.getElementById('responseModal')).show();
                                });
                            });
                        }
                    } else {
                        tbody.innerHTML = `<tr><td colspan="${role === 'shopkeeper'?6:5}" class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fs-1 mb-3 d-block opacity-25"></i> Failed to load requests.</td></tr>`;
                    }
                } catch(e) {
                    document.getElementById('requestsTableBody').innerHTML = `<tr><td colspan="${role === 'shopkeeper'?6:5}" class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fs-1 mb-3 d-block opacity-25"></i> Error loading requests.</td></tr>`;
                }
            };

            const confirmBtn = document.getElementById('confirmResponseBtn');
            if (confirmBtn) {
                confirmBtn.addEventListener('click', async () => {
                    const id = document.getElementById('responseTargetId').value;
                    const status = document.getElementById('responseStatus').value;
                    const responseMessage = document.getElementById('responseMessageTxt').value;
                    const btn = document.getElementById('confirmResponseBtn');
                    
                    const originalText = btn.innerHTML;
                    btn.disabled = true;
                    btn.innerHTML = 'Processing...';

                    try {
                        const updateRes = await apiCall(`/requests/${id}`, 'PUT', { status, responseMessage });
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                        
                        if (updateRes.success) {
                            showAlert(`Request marked as ${status}!`, 'success');
                            bootstrap.Modal.getInstance(document.getElementById('responseModal')).hide();
                            loadRequests();
                        } else {
                            showAlert(updateRes.message || 'Error updating status.', 'danger');
                        }
                    } catch(err) {
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                        showAlert('Network error.', 'danger');
                    }
                });
            }

            // Handle New Request Form Logic for Farmers
            if (role === 'farmer') {
                document.querySelectorAll('.farmer-only').forEach(el => el.style.display = 'block');
                const newReqShop = document.getElementById('newReqShop');
                const newReqProduct = document.getElementById('newReqProduct');
                let allProducts = [];

                const requestModalElement = document.getElementById('newRequestModal');
                if (requestModalElement) {
                    requestModalElement.addEventListener('show.bs.modal', async () => {
                        try {
                            const pRes = await apiCall('/products', 'GET');
                            if (pRes.success) {
                                allProducts = pRes.products;
                                
                                const uniqueShops = [];
                                allProducts.forEach(p => {
                                    if (p.shopId && !uniqueShops.some(s => s._id === p.shopId._id)) {
                                        uniqueShops.push(p.shopId);
                                    }
                                });
                                uniqueShops.sort((a,b) => (a.shopName || '').localeCompare(b.shopName || ''));
                                
                                newReqShop.innerHTML = '<option value="">-- Choose a Shop --</option>';
                                uniqueShops.forEach(shop => {
                                    const option = document.createElement('option');
                                    option.value = shop._id;
                                    option.textContent = shop.shopName || 'Unknown Shop';
                                    newReqShop.appendChild(option);
                                });
                            }
                        } catch(e) {
                            console.error('Failed to load products for new request', e);
                        }
                    });

                    newReqShop.addEventListener('change', (e) => {
                        const shopId = e.target.value;
                        newReqProduct.innerHTML = '<option value="">-- Choose a Product --</option>';
                        if (!shopId) {
                            newReqProduct.disabled = true;
                            return;
                        }
                        
                        const shopProducts = allProducts.filter(p => p.shopId && p.shopId._id === shopId && p.quantity > 0);
                        shopProducts.forEach(p => {
                            const option = document.createElement('option');
                            option.value = p._id;
                            option.textContent = `${p.productName} (₹${p.price} - ${p.quantity} left)`;
                            newReqProduct.appendChild(option);
                        });
                        newReqProduct.disabled = false;
                    });

                    document.getElementById('newRequestForm').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const shopId = newReqShop.value;
                        const productId = newReqProduct.value;
                        const quantity = document.getElementById('newReqQuantity').value;
                        const message = document.getElementById('newReqMessage').value;
                        
                        const btn = document.getElementById('submitNewRequestBtn');
                        const originalText = btn.innerHTML;
                        btn.disabled = true;
                        btn.innerHTML = 'Sending...';

                        try {
                            const res = await apiCall('/requests', 'POST', { shopId, productId, quantity, message });
                            btn.disabled = false;
                            btn.innerHTML = originalText;

                            if (res.success) {
                                showAlert('Request sent successfully!', 'success');
                                bootstrap.Modal.getInstance(requestModalElement).hide();
                                document.getElementById('newRequestForm').reset();
                                loadRequests(); 
                            } else {
                                showAlert(res.message || 'Failed to send request.', 'danger');
                            }
                        } catch (err) {
                            btn.disabled = false;
                            btn.innerHTML = originalText;
                            showAlert('Network error.', 'danger');
                        }
                    });
                }
            }

            loadRequests();
        });
    </script>



            <div class="lang-selector-floating" style="position:fixed; bottom:20px; right:20px; z-index:9999; background:rgba(255,255,255,0.9); padding:5px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
                <select id="langSelect" class="form-select form-select-sm border-0 shadow-none fw-bold text-success">
                    <option value="en"><span data-i18n="english_en_935bb">English (EN)</span></option>
                    <option value="hi"><span data-i18n="_hi_270b2">हिंदी (HI)</span></option>
                    <option value="mr"><span data-i18n="_mr_b445f">मराठी (MR)</span></option>
                </select>
            </div>
            </body></html>
