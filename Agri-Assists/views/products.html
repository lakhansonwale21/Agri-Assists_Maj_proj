<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Agri-Assists</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100" style="background: linear-gradient(rgba(244, 252, 245, 0.9), rgba(244, 252, 245, 0.95)), url('https://images.unsplash.com/photo-1605000797499-95a51c5269ae?q=80&amp;w=2000&amp;auto=format&amp;fit=crop') center/cover fixed;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary-green sticky-top shadow-sm py-2 bg-opacity-75" style="backdrop-filter: blur(10px);">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold fs-5 text-white" href="/dashboard"><i class="fas fa-arrow-left me-2"></i> <span data-i18n="back_to_dashboard_3649f">Back to Dashboard</span></a>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <div class="row mx-0 border border-light bg-white p-4 rounded-4 shadow-sm mb-5 align-items-center">
            <div class="col-md-7 mb-3 mb-md-0">
                <h2 class="fw-bolder fs-2 mb-1"><i class="fas fa-boxes text-primary-green me-2"></i> <span data-i18n="my_inventory_a8170">My Inventory</span></h2>
                <p class="text-muted mb-0 fs-5"><span data-i18n="manage_and_update_yo_3a72e">Manage and update your available shop products here.</span></p>
            </div>
            <div class="col-md-5 text-md-end">
                <button class="btn btn-accent rounded-pill fw-bold px-4 py-3 shadow-sm fs-5 w-100 w-md-auto" data-bs-toggle="modal" data-bs-target="#addProductModal">
                    <i class="fas fa-plus-circle me-2"></i> <span data-i18n="add_new_product_512b2">Add New Product</span>
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-5 animate-fade-in-up hover-lift">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle fs-5">
                        <thead class="bg-light text-muted">
                            <tr>
                                <th class="ps-4 py-4 fw-semibold border-bottom-0"><span data-i18n="product_name_b9aef">Product Name</span></th>
                                <th class="py-4 fw-semibold border-bottom-0"><span data-i18n="category_3adbd">Category</span></th>
                                <th class="py-4 fw-semibold border-bottom-0"><span data-i18n="price__6e2ad">Price (₹)</span></th>
                                <th class="py-4 fw-semibold border-bottom-0"><span data-i18n="stock_quantity_f7661">Stock Quantity</span></th>
                                <th class="pe-4 py-4 fw-semibold border-bottom-0 text-end"><span data-i18n="actions_06df3">Actions</span></th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody" class="border-top-0">
                            <tr><td colspan="5" class="text-center py-5 text-muted"><div class="spinner-border text-success"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header bg-primary-green text-white border-0 py-3">
                    <h5 class="modal-title fw-bold" id="productModalTitle"><i class="fas fa-box-open me-2"></i> <span data-i18n="add_new_product_512b2">Add New Product</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 p-md-5 bg-white">
                    <form id="productForm">
                        <input type="hidden" id="editProductId">
                        <div class="mb-4">
                            <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="product_name_b9aef">Product Name</span></label>
                            <input type="text" class="form-control py-3 bg-light shadow-none border-light" id="productName" required="" placeholder="e.g. Urea Fertilizer 50kg" data-i18n-placeholder="eg_urea_fertilizer_5_d9a22">
                        </div>
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="category_3adbd">Category</span></label>
                                <select class="form-select py-3 bg-light shadow-none border-light" id="productCategory" required="">
                                    <option value=""><span data-i18n="select_category_76729">Select Category</span></option>
                                    <option value="Fertilizers"><span data-i18n="fertilizers_754d5">Fertilizers</span></option>
                                    <option value="Seeds"><span data-i18n="seeds_0739f">Seeds</span></option>
                                    <option value="Pesticides"><span data-i18n="pesticides_1e681">Pesticides</span></option>
                                    <option value="Equipment"><span data-i18n="equipment_9ccda">Equipment</span></option>
                                    <option value="Other"><span data-i18n="other_6311a">Other</span></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="price__6e2ad">Price (₹)</span></label>
                                <input type="number" class="form-control py-3 bg-light shadow-none border-light" id="productPrice" required="" min="1" placeholder="Amount" data-i18n-placeholder="amount_b2f40">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="stock_quantity_f7661">Stock Quantity</span></label>
                                <input type="number" class="form-control py-3 bg-light shadow-none border-light" id="productQuantity" required="" min="1" placeholder="Units available" data-i18n-placeholder="units_available_48002">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-dark fw-semibold mb-2"><span data-i18n="description_b5a7a">Description</span></label>
                            <textarea class="form-control py-3 bg-light shadow-none border-light" id="productDesc" rows="3" placeholder="Provide additional details, brand, usage instructions..." data-i18n-placeholder="provide_additional_d_f9f01"></textarea>
                        </div>
                        <button type="submit" class="btn btn-accent rounded-pill w-100 py-3 fw-bold fs-5 shadow-sm mt-2" id="saveProductBtn"><span data-i18n="save_product_04d7c">Save Product</span> <i class="fas fa-check-circle ms-2"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (getUserRole() !== 'shopkeeper') {
                window.location.href = '/dashboard';
                return;
            }

            const productsModal = new bootstrap.Modal(document.getElementById('addProductModal'));
            let currentProducts = [];

            const loadProducts = async () => {
                try {
                    const res = await apiCall('/products/shop', 'GET');
                    const tbody = document.getElementById('productsTableBody');
                    
                    if(res.success) {
                        currentProducts = res.products;
                        let html = '';
                        res.products.forEach(p => {
                            html += `
                                <tr>
                                    <td class="ps-4 fw-bold text-dark py-3"><div class="d-flex align-items-center"><i class="fas fa-box-open text-primary-green me-2"></i> ${p.productName}</div></td>
                                    <td class="py-3">${p.category}</td>
                                    <td class="text-success fw-bolder fs-4 py-3">₹${p.price}</td>
                                    <td class="py-3"><span class="badge ${p.quantity > 0 ? 'bg-success' : 'bg-danger'} bg-opacity-10 ${p.quantity > 0 ? 'text-success' : 'text-danger'} border-0 px-3 py-2 fs-6 rounded-pill">${p.quantity} Unit(s)</span></td>
                                    <td class="pe-4 text-end py-3">
                                        <button class="btn btn-sm btn-outline-primary-custom rounded-pill me-2 edit-btn px-3 fw-bold" data-id="${p._id}"><i class="fas fa-edit me-1"></i> Edit</button>
                                        <button class="btn btn-sm btn-outline-danger rounded-pill delete-btn px-3 fw-bold" data-id="${p._id}"><i class="fas fa-trash me-1"></i> Delete</button>
                                    </td>
                                </tr>
                            `;
                        });
                        if (res.products.length === 0) html = '<tr><td colspan="5" class="text-center py-5 text-muted"><i class="fas fa-box-open fs-1 mb-3 d-block opacity-25"></i> No products found. Click "Add New Product" to start!</td></tr>';
                        tbody.innerHTML = html;

                        // Bind actions
                        document.querySelectorAll('.edit-btn').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                const id = e.currentTarget.getAttribute('data-id');
                                const product = currentProducts.find(x => x._id === id);
                                if(product) {
                                    document.getElementById('productModalTitle').innerHTML = '<i class="fas fa-edit me-2"></i> Edit Product';
                                    document.getElementById('editProductId').value = product._id;
                                    document.getElementById('productName').value = product.productName;
                                    document.getElementById('productCategory').value = product.category;
                                    document.getElementById('productPrice').value = product.price;
                                    document.getElementById('productQuantity').value = product.quantity;
                                    document.getElementById('productDesc').value = product.description;
                                    productsModal.show();
                                }
                            });
                        });

                        document.querySelectorAll('.delete-btn').forEach(btn => {
                            btn.addEventListener('click', async (e) => {
                                if(confirm('Are you sure you want to completely remove this product from your inventory?')) {
                                    const id = e.currentTarget.getAttribute('data-id');
                                    const delRes = await apiCall(`/products/${id}`, 'DELETE');
                                    if(delRes.success) {
                                        showAlert('Product deleted successfully.', 'success');
                                        loadProducts();
                                    } else {
                                        showAlert(delRes.message, 'danger');
                                    }
                                }
                            });
                        });

                    } else {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fs-1 mb-3 d-block opacity-25"></i> Failed to load products.</td></tr>';
                    }
                } catch(e) {
                    document.getElementById('productsTableBody').innerHTML = '<tr><td colspan="5" class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fs-1 mb-3 d-block opacity-25"></i> Error loading products.</td></tr>';
                }
            };

            loadProducts();

            // Handle add/edit form submit
            document.getElementById('productForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('editProductId').value;
                const data = {
                    productName: document.getElementById('productName').value,
                    category: document.getElementById('productCategory').value,
                    price: document.getElementById('productPrice').value,
                    quantity: document.getElementById('productQuantity').value,
                    description: document.getElementById('productDesc').value
                };

                try {
                    let res;
                    if(id) {
                        res = await apiCall(`/products/${id}`, 'PUT', data); // Edit
                    } else {
                        res = await apiCall('/products', 'POST', data); // Create
                    }

                    if (res.success) {
                        showAlert(id ? 'Product updated successfully!' : 'Product added successfully!', 'success');
                        productsModal.hide();
                        document.getElementById('productForm').reset();
                        document.getElementById('editProductId').value = '';
                        document.getElementById('productModalTitle').innerHTML = '<i class="fas fa-box-open me-2"></i> Add New Product';
                        loadProducts();
                    } else {
                        showAlert(res.message || 'Failed to save product.', 'danger');
                    }
                } catch (err) {
                    showAlert('Network error.', 'danger');
                }
            });

            // Reset form on modal hide
            document.getElementById('addProductModal').addEventListener('hidden.bs.modal', () => {
                document.getElementById('productForm').reset();
                document.getElementById('editProductId').value = '';
                document.getElementById('productModalTitle').innerHTML = '<i class="fas fa-box-open me-2"></i> Add New Product';
            });
        });
    </script>



            <div class="lang-selector-floating" style="position:fixed; bottom:20px; right:20px; z-index:9999; background:rgba(255,255,255,0.9); padding:5px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
                <select id="langSelect" class="form-select form-select-sm border-0 shadow-none fw-bold text-success">
                    <option value="en"><span data-i18n="english_en_935bb">English (EN)</span></option>
                    <option value="hi"><span data-i18n="_hi_270b2">हिंदी (HI)</span></option>
                    <option value="mr"><span data-i18n="_mr_b445f">मराठी (MR)</span></option>
                </select>
            </div>
            </body></html>
