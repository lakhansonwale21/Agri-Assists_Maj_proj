<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agri-Assists</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1464226184884-fa280b87c399?q=80&amp;w=2000&amp;auto=format&amp;fit=crop') center/cover fixed;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold fs-4" href="/">
                <i class="fas fa-leaf text-accent me-2"></i> <span data-i18n="agriassists_eab25">Agri-Assists</span>
            </a>
            <div class="ms-auto">
                <a href="/register" class="btn btn-outline-light rounded-pill px-4 fw-bold shadow-sm bg-glass"><span data-i18n="register_instead_36c27">Register instead</span></a>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center py-5 position-relative z-index-1">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden animate-fade-in-up hover-lift" style="width: 100%; max-width: 450px;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="icon-box mb-3" style="width: 70px; height: 70px; font-size: 2rem;">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h3 class="fw-bolder fs-2"><span data-i18n="welcome_back_d6504">Welcome Back</span></h3>
                    <p class="text-muted fs-6"><span data-i18n="login_to_your_accoun_9d85f">Login to your account to continue</span></p>
                </div>
                <form id="loginForm">
                    <div class="mb-4">
                        <label class="form-label text-dark fw-semibold"><span data-i18n="email_address">Email Address</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 py-3"><i class="fas fa-envelope text-primary-green"></i></span>
                            <input type="email" class="form-control border-start-0 py-3 bg-light shadow-none" id="email" required="" placeholder="name@example.com" data-i18n-placeholder="nameexamplecom_a130c">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-dark fw-semibold"><span data-i18n="password_dc647">Password</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 py-3"><i class="fas fa-lock text-primary-green"></i></span>
                            <input type="password" class="form-control border-start-0 py-3 bg-light shadow-none" id="password" required="" placeholder="Enter password" data-i18n-placeholder="enter_password_483bc">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-accent rounded-pill w-100 py-3 fw-bold fs-5 shadow-sm mt-2"><span data-i18n="login_4976d">LOGIN</span> <i class="fas fa-arrow-right ms-2"></i></button>
                </form>
                <div class="text-center mt-5 pt-4 border-top">
                    <p class="mb-0 text-muted fs-6"><span data-i18n="dont_have_an_account_a5f61">Don't have an account?</span> <a href="/register" class="text-primary-green text-decoration-none fw-bold"><span data-i18n="sign_up_here_e48fa">Sign up here</span></a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>



            <div class="lang-selector-floating" style="position:fixed; bottom:20px; right:20px; z-index:9999; background:rgba(255,255,255,0.9); padding:5px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
                <select id="langSelect" class="form-select form-select-sm border-0 shadow-none fw-bold text-success">
                    <option value="en"><span data-i18n="english_en_935bb">English (EN)</span></option>
                    <option value="hi"><span data-i18n="_hi_270b2">हिंदी (HI)</span></option>
                    <option value="mr"><span data-i18n="_mr_b445f">मराठी (MR)</span></option>
                </select>
            </div>
            </body></html>
